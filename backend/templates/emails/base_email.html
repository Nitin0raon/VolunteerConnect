{% comment %}Base email styling included inline since email clients don't support external CSS{% endcomment %}
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: Arial, sans-serif; background: #f4f4f7; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 0 auto; padding: 24px; }
  .card { background: #ffffff; border-radius: 8px; padding: 32px; }
  .header { font-size: 20px; font-weight: bold; color: #1a1a1a; margin-bottom: 16px; }
  .button { display: inline-block; background: #2563eb; color: #ffffff; padding: 12px 24px;
            border-radius: 6px; text-decoration: none; margin-top: 16px; }
  .footer { font-size: 12px; color: #888; margin-top: 24px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">© NGO Volunteer Platform. This is an automated email.</div>
</div>
</body>
</html>
